name: Add public products page

on:
  push:
    paths:
      - '.github/workflows/add-public-products-page.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch public products page
        run: |
          node <<'NODE'
          const fs = require('fs')

          function replaceOnce(src, from, to, label) {
            if (!src.includes(from)) {
              console.log(`Skip ${label}: pattern not found`)
              return src
            }
            return src.replace(from, to)
          }

          // 1) Add public page wrapper
          fs.writeFileSync('app/src/pages/PublicProducts.tsx', `import { useNavigate, useParams } from 'react-router-dom'\nimport { ArrowLeft, LogIn } from 'lucide-react'\nimport MemberPicks from '../components/MemberPicks'\nimport type { ClientData } from '../lib/clientData'\n\nconst guestClient = {\n  id: 'public-guest',\n  name: '訪客',\n  phone: '',\n  status: 'active',\n} as ClientData\n\nexport default function PublicProducts() {\n  const navigate = useNavigate()\n  const { productId } = useParams()\n\n  return (\n    <div className=\"min-h-screen bg-a2o-beige\">\n      <div className=\"bg-white border-b border-a2o-warm\">\n        <div className=\"max-w-[1500px] mx-auto px-4 md:px-8 py-4 flex items-center justify-between\">\n          <button onClick={() => navigate('/')} className=\"flex items-center gap-2 text-sm text-a2o-black/60 hover:text-a2o-pink\">\n            <ArrowLeft className=\"w-4 h-4\" /> 首頁\n          </button>\n          <div className=\"flex items-center gap-3\">\n            <button\n              onClick={() => navigate('/experience')}\n              className=\"text-sm text-a2o-black/60 hover:text-a2o-pink\"\n            >\n              形象體驗\n            </button>\n            <button\n              onClick={() => navigate('/crm/login')}\n              className=\"inline-flex items-center gap-1 rounded-full bg-a2o-black px-3 py-1.5 text-sm text-white hover:bg-a2o-pink\"\n            >\n              <LogIn className=\"w-4 h-4\" /> 客戶登入\n            </button>\n          </div>\n        </div>\n      </div>\n\n      <main className=\"max-w-[1500px] mx-auto p-4 md:px-8 pb-20\">\n        <MemberPicks\n          client={guestClient}\n          clientPhone=\"\"\n          initialProductId={productId}\n          publicMode\n        />\n      </main>\n    </div>\n  )\n}\n`)

          // 2) Patch App routes
          const appPath = 'app/src/App.tsx'
          let app = fs.readFileSync(appPath, 'utf8')
          app = replaceOnce(app, "import PortalStaff from './pages/PortalStaff'", "import PortalStaff from './pages/PortalStaff'\nimport PublicProducts from './pages/PublicProducts'", 'app import PublicProducts')
          app = replaceOnce(app, "      <Route path=\"/experience\" element={<Experience />} />", "      <Route path=\"/experience\" element={<Experience />} />\n      <Route path=\"/products\" element={<PublicProducts />} />\n      <Route path=\"/products/:productId\" element={<PublicProducts />} />", 'app product routes')
          fs.writeFileSync(appPath, app)

          // 3) Patch Home nav menu
          const homePath = 'app/src/pages/Home.tsx'
          let home = fs.readFileSync(homePath, 'utf8')
          home = replaceOnce(home,
            "          <div className=\"flex items-center gap-2 sm:gap-3\">\n            <button\n              onClick={() => navigate('/experience')}\n              className=\"text-xs sm:text-sm font-medium text-a2o-black hover:text-a2o-pink transition-colors px-2 sm:px-3 py-1.5\"\n            >\n              形象體驗\n            </button>\n            <button\n              onClick={() => navigate('/crm/login')}\n              className=\"text-xs sm:text-sm font-medium bg-a2o-black text-white px-3 sm:px-4 py-1.5 rounded-full hover:bg-a2o-pink transition-colors\"\n            >\n              客戶登入\n            </button>\n          </div>",
            "          <div className=\"flex items-center gap-1 sm:gap-3\">\n            <button\n              onClick={() => navigate('/products')}\n              className=\"text-xs sm:text-sm font-medium text-a2o-black hover:text-a2o-pink transition-colors px-2 sm:px-3 py-1.5\"\n            >\n              會員單品\n            </button>\n            <button\n              onClick={() => navigate('/experience')}\n              className=\"text-xs sm:text-sm font-medium text-a2o-black hover:text-a2o-pink transition-colors px-2 sm:px-3 py-1.5\"\n            >\n              形象體驗\n            </button>\n            <button\n              onClick={() => navigate('/crm/login')}\n              className=\"text-xs sm:text-sm font-medium bg-a2o-black text-white px-3 sm:px-4 py-1.5 rounded-full hover:bg-a2o-pink transition-colors\"\n            >\n              客戶登入\n            </button>\n          </div>",
            'home top menu')
          fs.writeFileSync(homePath, home)

          // 4) Patch MemberPicks for public mode + deep links
          const memberPath = 'app/src/components/MemberPicks.tsx'
          let member = fs.readFileSync(memberPath, 'utf8')

          member = replaceOnce(member,
            "import { ArrowLeft, MessageCircle, X } from 'lucide-react'",
            "import { ArrowLeft, Copy, MessageCircle, X } from 'lucide-react'",
            'member import Copy')

          member = replaceOnce(member,
            "type Props = {\n  client: ClientData\n  clientPhone: string\n}",
            "type Props = {\n  client: ClientData\n  clientPhone: string\n  initialProductId?: string\n  publicMode?: boolean\n}",
            'member props type')

          member = replaceOnce(member,
            "export default function MemberPicks({ client, clientPhone }: Props) {",
            "export default function MemberPicks({ client, clientPhone, initialProductId, publicMode = false }: Props) {",
            'member props destructure')

          member = replaceOnce(member,
            "  useEffect(() => {\n    setActiveImage(0)\n  }, [selectedProduct?.id])",
            "  useEffect(() => {\n    if (!initialProductId) return\n    const matchedProduct = products.find(product => product.id === initialProductId)\n    if (matchedProduct) setSelectedProduct(matchedProduct)\n  }, [initialProductId, products])\n\n  useEffect(() => {\n    setActiveImage(0)\n  }, [selectedProduct?.id])",
            'member auto open product')

          member = replaceOnce(member,
            "  const buildWhatsAppLink = (product: MemberProduct) => {",
            "  const buildProductLink = (product: MemberProduct) => `${window.location.origin}/#/products/${encodeURIComponent(product.id)}`\n\n  const openProduct = (product: MemberProduct) => {\n    setSelectedProduct(product)\n    if (publicMode) {\n      window.history.replaceState(null, '', `${window.location.pathname}#/products/${encodeURIComponent(product.id)}`)\n    }\n  }\n\n  const copyProductLink = async (product: MemberProduct) => {\n    try {\n      await navigator.clipboard?.writeText(buildProductLink(product))\n    } catch (error) {\n      console.error('Copy product link failed:', error)\n    }\n  }\n\n  const buildWhatsAppLink = (product: MemberProduct) => {",
            'member link helpers')

          member = replaceOnce(member,
            "\\n會員價：${product.memberPrice}\\n客人：${client.name}",
            "\\n會員價：${product.memberPrice}\\n產品連結：${buildProductLink(product)}\\n客人：${client.name}",
            'member whatsapp include product link')

          member = replaceOnce(member,
            "onClick={() => setSelectedProduct(null)}",
            "onClick={() => { setSelectedProduct(null); if (publicMode) window.history.replaceState(null, '', `${window.location.pathname}#/products`) }}",
            'member back button url')

          member = replaceOnce(member,
            "onClick={() => setSelectedProduct(null)} className=\"inline-flex size-9",
            "onClick={() => { setSelectedProduct(null); if (publicMode) window.history.replaceState(null, '', `${window.location.pathname}#/products`) }} className=\"inline-flex size-9",
            'member close button url')

          member = replaceOnce(member,
            "          A2O 會員衣櫥 · 優先選購",
            "          會員專屬單品 · A2O Style Lab",
            'member public heading')

          member = replaceOnce(member,
            "會員專屬選品</h3>",
            "會員專屬單品</h3>",
            'member title')

          member = replaceOnce(member,
            "由 A2O 造型師為會員搜羅的男士單品。你可以按單品類型、風格方向與 12 季色彩分析挑選合適款式。",
            "由 A2O 造型師嚴選的男士單品。你可以按單品類型、風格方向與 12 季色彩分析，挑選更適合自己形象的款式。",
            'member description')

          member = replaceOnce(member,
            "<article key={product.id} className=\"group cursor-pointer\" onClick={() => setSelectedProduct(product)}>",
            "<article key={product.id} className=\"group cursor-pointer\" onClick={() => openProduct(product)}>",
            'member card open')

          member = replaceOnce(member,
            "                      <button type=\"button\" className=\"mt-3 inline-flex w-full items-center justify-center bg-zinc-950 px-3 py-2.5 text-[10px] font-semibold uppercase tracking-[0.16em] text-white transition-colors hover:bg-zinc-800\">查看詳情</button>",
            "                      <div className=\"mt-3 grid gap-2\">\n                        <button type=\"button\" className=\"inline-flex w-full items-center justify-center bg-zinc-950 px-3 py-2.5 text-[10px] font-semibold uppercase tracking-[0.16em] text-white transition-colors hover:bg-zinc-800\">查看詳情</button>\n                        {publicMode && (\n                          <button\n                            type=\"button\"\n                            onClick={(event) => { event.stopPropagation(); copyProductLink(product) }}\n                            className=\"inline-flex w-full items-center justify-center gap-1 border border-zinc-200 bg-white px-3 py-2 text-[10px] font-semibold uppercase tracking-[0.16em] text-zinc-500 transition-colors hover:border-zinc-950 hover:text-zinc-950\"\n                          >\n                            <Copy className=\"size-3\" /> 複製產品連結\n                          </button>\n                        )}\n                      </div>",
            'member card copy button')

          member = replaceOnce(member,
            "                <a href={buildWhatsAppLink(selectedProduct)} target=\"_blank\" rel=\"noopener noreferrer\" className=\"mt-6 inline-flex w-full items-center justify-center gap-2 bg-zinc-950 px-4 py-4 text-xs font-semibold uppercase tracking-[0.18em] text-white transition-colors hover:bg-zinc-800\">\n                  <MessageCircle className=\"size-4\" /> WhatsApp 查詢造型師\n                </a>",
            "                <div className=\"mt-6 grid gap-3 sm:grid-cols-2\">\n                  <button\n                    type=\"button\"\n                    onClick={() => copyProductLink(selectedProduct)}\n                    className=\"inline-flex w-full items-center justify-center gap-2 border border-zinc-950 bg-white px-4 py-4 text-xs font-semibold uppercase tracking-[0.18em] text-zinc-950 transition-colors hover:bg-zinc-50\"\n                  >\n                    <Copy className=\"size-4\" /> 複製產品連結\n                  </button>\n                  <a href={buildWhatsAppLink(selectedProduct)} target=\"_blank\" rel=\"noopener noreferrer\" className=\"inline-flex w-full items-center justify-center gap-2 bg-zinc-950 px-4 py-4 text-xs font-semibold uppercase tracking-[0.18em] text-white transition-colors hover:bg-zinc-800\">\n                    <MessageCircle className=\"size-4\" /> WhatsApp 查詢\n                  </a>\n                </div>",
            'member detail buttons')

          fs.writeFileSync(memberPath, member)
          NODE

      - name: Build check
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Commit patched files
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/App.tsx app/src/pages/Home.tsx app/src/pages/PublicProducts.tsx app/src/components/MemberPicks.tsx
          git commit -m "Add public member products page"
          git push
